name: atom-neptune-firmwave

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      validate_locked_artifacts:
        description: Download and fully validate the locked P210/Pluto artifacts
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Firmwave
        run: python -m pip install -e .
      - name: Install HDL simulator
        run: |
          sudo apt-get update
          sudo apt-get install -y iverilog
      - name: Run standalone source gate
        run: scripts/check.sh

  kernel-module-gate:
    name: Generic Linux API compile (non-release)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - name: Install runner generic Linux headers
        run: |
          sudo apt-get update
          sudo apt-get install -y linux-headers-generic
      - name: Compile source against runner generic headers only
        run: |
          KDIR="$(find /usr/src -maxdepth 1 -type d -name 'linux-headers-*-generic' -print | sort -V | tail -n 1)"
          test -n "$KDIR"
          printf 'Non-release API compile using %s\n' "$KDIR"
          make -C ps/kernel/neptune_stream KDIR="$KDIR" W=1 modules

  distribution-gate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Build wheel and source distribution
        run: |
          python -m pip install build
          python -m build
      - name: Verify contents and clean wheel install
        run: |
          python tools/release/verify_distribution.py dist/*.whl dist/*.tar.gz
          python -m venv /tmp/neptune-wheel-test
          /tmp/neptune-wheel-test/bin/python -m pip install --no-deps dist/*.whl
          /tmp/neptune-wheel-test/bin/neptune-firmwave --help >/dev/null

  locked-artifact-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_locked_artifacts }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Firmwave
        run: python -m pip install -e .
      - name: Fetch and validate locked artifacts without flashing
        run: |
          scripts/fetch_firmware.py --json
          scripts/test_firmware.py --json
          neptune-firmwave validate-xsa --artifact p210-system-xsa --json
