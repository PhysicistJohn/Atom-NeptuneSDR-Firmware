%YAML 1.2
---
$id: http://devicetree.org/schemas/misc/hamgeek,neptune-stream-dma-v1.yaml#
$schema: http://devicetree.org/meta-schemas/core.yaml#

title: HamGeek Neptune SDR PL-to-PS DMA stream

maintainers:
  - PhysicistJohn <54456354+PhysicistJohn@users.noreply.github.com>

description: |
  Receive-only PL stream endpoint implementing the canonical Neptune PL v1
  register map and mmap-slot metadata contract.  Linux allocates one 32-bit
  DMA-coherent ring and submits each slot through the DMAEngine receive channel
  named rx.  No private descriptor FIFO is overlaid on the PL register map.

  Presence of this node is a hardware assertion.  The driver also verifies the
  live identity, exact PL ABI version, capability bits, reset, fault interrupt,
  DMAEngine direction, DMA mask, and mmap support; a DT compatible alone is
  insufficient.

properties:
  compatible:
    const: hamgeek,neptune-stream-dma-v1

  reg:
    maxItems: 1

  interrupts:
    maxItems: 1

  interrupt-names:
    const: fault

  dmas:
    maxItems: 1

  dma-names:
    const: rx

  clocks:
    maxItems: 1

  resets:
    maxItems: 1
    description: Dedicated reset for the complete stream endpoint.

  ring-slots:
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 4
    maximum: 256
    description: Number of fixed-size hardware slots.

  slot-bytes:
    $ref: /schemas/types.yaml#/definitions/uint32
    minimum: 4096
    maximum: 1048576
    multipleOf: 4096
    description: |
      Bytes per slot, including the 128-byte metadata header.  This binding is
      for 4 KiB-page Zynq systems; the driver additionally checks PAGE_SIZE.

required:
  - compatible
  - reg
  - interrupts
  - interrupt-names
  - dmas
  - dma-names
  - resets
  - ring-slots
  - slot-bytes

additionalProperties: false

examples:
  - |
    stream_dma: stream@7c480000 {
        compatible = "hamgeek,neptune-stream-dma-v1";
        reg = <0x7c480000 0x1000>;
        interrupt-parent = <&intc>;
        interrupts = <0 59 4>;
        interrupt-names = "fault";
        dmas = <&rx_dmac 0>;
        dma-names = "rx";
        clocks = <&clkc 15>;
        resets = <&stream_reset 0>;
        ring-slots = <64>;
        slot-bytes = <262144>;
    };
...
