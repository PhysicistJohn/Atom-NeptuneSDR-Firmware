name: atom-neptune-firmware

on:
  push:
  pull_request:
  workflow_dispatch:
    inputs:
      validate_locked_artifacts:
        description: Download and fully validate the locked P210/Pluto artifacts
        required: false
        default: false
        type: boolean

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  source-gate:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python: ["3.9", "3.12"]
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install Firmware
        run: python -m pip install -e .
      - name: Run standalone source gate
        run: scripts/check.sh

  locked-artifact-gate:
    if: ${{ github.event_name == 'workflow_dispatch' && inputs.validate_locked_artifacts }}
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          persist-credentials: false
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065 # v5
        with:
          python-version: "3.12"
      - name: Install Firmware
        run: python -m pip install -e .
      - name: Fetch and validate locked artifacts without flashing
        run: |
          scripts/fetch_firmware.py --json
          scripts/test_firmware.py --json
          neptune-firmware validate-xsa --artifact p210-system-xsa --json
